<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Teacher Dashboard — Stock Market Assignment</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">
      <h1>Teacher Dashboard — Stock Market Assignment</h1>
      <p>Live leaderboard + compliance pulled from your Google Sheet (Apps Script backend).</p>
    </div>
    <div class="badge"><span>🧑‍🏫</span><span><strong>Live Data</strong></span></div>
  </div>

  <div class="panel">
    <div class="row">
      <button class="btn primary" id="refreshBtn" type="button">Refresh</button>
      <span class="small" id="status">—</span>
    </div>

    <div class="hr"></div>

    <h2>Leaderboard</h2>
    <div id="leader" class="tableWrap"></div>

    <div class="hr"></div>

    <h2>Compliance</h2>
    <div class="small">Entries completed, last date, and started timestamp.</div>
    <div id="comp" class="tableWrap"></div>
  </div>
</div>

<script>
(() => {
  /* ===========================
     CONFIG
     =========================== */
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzb8y2Lemi4wh35KriEVrdnBLE2Q5BLNdE7Gs-x3tJkOVypKBxYwWLO0Fob3YRYWDMMGQ/exec";
  const CLASS_CODE = "STOCK6WEEK";

  const $ = (id)=>document.getElementById(id);
  const fmtMoney = (n)=>Number(n||0).toLocaleString(undefined,{style:"currency",currency:"USD",maximumFractionDigits:2});

  function escapeHtml(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  /* ===========================
     JSONP — NO CORS
     =========================== */
  function jsonp(fn, params={}){
    return new Promise((resolve) => {
      const cbName = "cb_" + Math.random().toString(36).slice(2);
      const q = new URLSearchParams({
        fn,
        classCode: CLASS_CODE,
        callback: cbName,
        _: Date.now(),
        ...params
      });

      window[cbName] = (data) => {
        try { resolve(data); } finally {
          delete window[cbName];
          script.remove();
        }
      };

      const script = document.createElement("script");
      script.src = `${SCRIPT_URL}?${q.toString()}`;
      script.onerror = () => {
        resolve({ ok:false, error:"JSONP load error" });
        try{ delete window[cbName]; }catch(e){}
        script.remove();
      };
      document.body.appendChild(script);
    });
  }

  function renderLeaderboard(list){
    const el = $("leader");
    if(!Array.isArray(list) || list.length===0){
      el.innerHTML = `<div class="small">No leaderboard data yet.</div>`;
      return;
    }

    const rows = list.map((s,i)=>`
      <tr>
        <td><strong>#${i+1}</strong></td>
        <td><strong>${escapeHtml(s.name)}</strong></td>
        <td>${escapeHtml(s.period || "")}</td>
        <td>${String(s.entriesCount || 0)}</td>
        <td>${escapeHtml(s.lastEntryDate || "—")}</td>
        <td><strong>${(typeof s.lastValue==="number") ? fmtMoney(s.lastValue) : "—"}</strong></td>
        <td>${(typeof s.gain==="number") ? fmtMoney(s.gain) : "—"}</td>
      </tr>
    `).join("");

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Rank</th><th>Student</th><th>Period</th><th>Entries</th>
            <th>Last Date</th><th>Value</th><th>Gain/Loss</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderCompliance(list){
    const el = $("comp");
    if(!Array.isArray(list) || list.length===0){
      el.innerHTML = `<div class="small">No compliance data yet.</div>`;
      return;
    }

    const rows = list.map(s=>`
      <tr>
        <td><strong>${escapeHtml(s.name)}</strong></td>
        <td>${escapeHtml(s.period || "")}</td>
        <td>${String(s.entriesCount || 0)}</td>
        <td>${escapeHtml(s.lastEntryDate || "—")}</td>
        <td>${escapeHtml(s.startedAtLocal || "—")}</td>
        <td class="small">${escapeHtml(s.studentKey || "")}</td>
      </tr>
    `).join("");

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Student</th><th>Period</th><th>Entries</th>
            <th>Last Entry Date</th><th>Started</th><th>StudentKey</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function refresh(){
    $("status").textContent = "Loading…";
    const [lb, comp] = await Promise.all([
      jsonp("leaderboard"),
      jsonp("compliance")
    ]);

    if(!lb.ok){
      $("status").textContent = "Leaderboard error. Check SCRIPT_URL deployment.";
      $("leader").innerHTML = `<div class="small">Error loading leaderboard.</div>`;
    } else {
      renderLeaderboard(lb.data || []);
    }

    if(!comp.ok){
      $("status").textContent = "Compliance error. Check SCRIPT_URL deployment.";
      $("comp").innerHTML = `<div class="small">Error loading compliance.</div>`;
    } else {
      renderCompliance(comp.data || []);
    }

    if(lb.ok && comp.ok){
      $("status").textContent = `Updated: ${new Date().toLocaleString()}`;
    }
  }

  $("refreshBtn").addEventListener("click", refresh);
  refresh();
})();
</script>
</body>
</html>
