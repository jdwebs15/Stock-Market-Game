<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Teacher Dashboard — Stock Market Assignment</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">
      <h1>Teacher Dashboard — Stock Market Assignment</h1>
      <p>Leaderboard + compliance pulled live from the teacher Google Sheet backend.</p>
    </div>
    <div class="badge"><span>🧑‍🏫</span><span><strong>Live</strong></span></div>
  </div>

  <div class="panel">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <button class="btn good" id="refreshBtn" type="button">Refresh</button>
        <span class="small" id="status">—</span>
      </div>
      <div class="small">Class Code: <strong id="classCodeLabel">STOCK6WEEK</strong></div>
    </div>

    <div class="hr"></div>

    <div class="grid">
      <div class="card" style="grid-column:span 12">
        <h2>Leaderboard</h2>
        <div id="leaderboard" class="tableWrap"></div>
      </div>

      <div class="card" style="grid-column:span 12">
        <h2>Compliance</h2>
        <p class="small">Shows entries completed (0–6), last check-in date, and whether they’ve started.</p>
        <div id="compliance" class="tableWrap"></div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const SCRIPT_URL = "PASTE_YOUR_WEB_APP_EXEC_URL_HERE";
  const CLASS_CODE = "STOCK6WEEK";

  const $ = (id) => document.getElementById(id);
  $("classCodeLabel").textContent = CLASS_CODE;

  function fmtMoney(n){ return Number(n||0).toLocaleString(undefined,{style:"currency",currency:"USD",maximumFractionDigits:2}); }
  function escapeHtml(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function jsonp(url, timeoutMs=12000){
    return new Promise((resolve) => {
      const cbName="__cb_"+Math.random().toString(36).slice(2);
      const script=document.createElement("script");
      let done=false;

      window[cbName]=(payload)=>{ if(done) return; done=true; cleanup(); resolve(payload); };
      const timer=setTimeout(()=>{ if(done) return; done=true; cleanup(); resolve({ok:false,error:"Timeout"}); }, timeoutMs);

      function cleanup(){
        clearTimeout(timer);
        try{ delete window[cbName]; }catch(e){ window[cbName]=undefined; }
        if(script.parentNode) script.parentNode.removeChild(script);
      }

      const joiner=url.includes("?")?"&":"?";
      script.src=url+joiner+"callback="+encodeURIComponent(cbName)+"&_="+Date.now();
      script.onerror=()=>{ if(done) return; done=true; cleanup(); resolve({ok:false,error:"Network/Script error"}); };
      document.body.appendChild(script);
    });
  }

  async function apiGet(fn){
    if(!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) return { ok:false, error:"SCRIPT_URL not set" };
    const url = `${SCRIPT_URL}?fn=${encodeURIComponent(fn)}&classCode=${encodeURIComponent(CLASS_CODE)}`;
    return await jsonp(url, 15000);
  }

  function setStatus(t){ $("status").textContent = t; }

  function renderLeaderboard(list){
    const el = $("leaderboard");
    if(!Array.isArray(list) || list.length===0){
      el.innerHTML = `<div class="small">No data yet.</div>`;
      return;
    }
    const rows = list.map((s,i)=>`
      <tr>
        <td><strong>#${i+1}</strong></td>
        <td><strong>${escapeHtml(s.name)}</strong></td>
        <td>${escapeHtml(s.period||"")}</td>
        <td>${String(s.entriesCount||0)}</td>
        <td>${escapeHtml(s.lastEntryDate||"—")}</td>
        <td><strong>${(typeof s.lastValue==="number") ? fmtMoney(s.lastValue) : "—"}</strong></td>
        <td>${(typeof s.gain==="number") ? fmtMoney(s.gain) : "—"}</td>
      </tr>
    `).join("");

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Rank</th><th>Student</th><th>Period</th><th>Entries</th>
            <th>Last Date</th><th>Value</th><th>Gain/Loss</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderCompliance(list){
    const el = $("compliance");
    if(!Array.isArray(list) || list.length===0){
      el.innerHTML = `<div class="small">No data yet.</div>`;
      return;
    }

    const rows = list.map(s=>{
      const entries = Number(s.entriesCount||0);
      const badge = entries >= 6 ? "✅" : (entries===0 ? "⚠️" : "⏳");
      return `
        <tr>
          <td>${badge}</td>
          <td><strong>${escapeHtml(s.name)}</strong></td>
          <td>${escapeHtml(s.period||"")}</td>
          <td>${String(entries)}</td>
          <td>${escapeHtml(s.lastEntryDate||"—")}</td>
          <td class="small">${escapeHtml(s.startedAtLocal||"—")}</td>
        </tr>
      `;
    }).join("");

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Status</th><th>Student</th><th>Period</th><th>Entries</th>
            <th>Last Entry</th><th>Started</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function refresh(){
    setStatus("Loading…");
    const [lb, comp] = await Promise.all([apiGet("leaderboard"), apiGet("compliance")]);

    if(!lb.ok || !comp.ok){
      setStatus("Error. Check Apps Script deployment (Anyone) and SCRIPT_URL.");
      return;
    }

    renderLeaderboard(lb.data||[]);
    renderCompliance(comp.data||[]);
    setStatus("Updated: " + new Date().toLocaleTimeString());
  }

  $("refreshBtn").addEventListener("click", refresh);
  refresh();
})();
</script>
</body>
</html>
