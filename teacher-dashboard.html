<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Teacher Dashboard — Stock Market Assignment</title>
  <link rel="stylesheet" href="./styles.css"/>
  <style>
    .msg{display:none;padding:10px;border-radius:12px;margin-top:10px}
    .msg.show{display:block}
    .msg.good{background:rgba(43,213,118,.12);border:1px solid rgba(43,213,118,.25)}
    .msg.bad{background:rgba(255,92,122,.12);border:1px solid rgba(255,92,122,.25)}
    .msg.warn{background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.25)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}
    .tableWrap{overflow:auto;border:1px solid rgba(255,255,255,.10);border-radius:14px}
    .small{opacity:.85;font-size:.92rem}
    .muted{opacity:.7}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.95em}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">
      <h1>Teacher Dashboard — Stock Market Assignment</h1>
      <p class="small">Leaderboard + compliance pulled live from the teacher Google Sheet backend.</p>
    </div>
    <div class="badge"><span>📊</span><span><strong>Live</strong></span></div>
  </div>

  <div class="panel">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <button class="btn good" id="refreshBtn" type="button">Refresh</button>
        <span class="small" id="status">—</span>
      </div>
      <div class="small muted">Class Code: <strong id="ccLabel">—</strong></div>
    </div>

    <div id="topMsg" class="msg"></div>

    <div class="hr"></div>

    <div class="grid">
      <div class="card" style="grid-column:span 12">
        <h2>Leaderboard</h2>
        <div id="leaderWrap" class="tableWrap"></div>
      </div>
    </div>

    <div class="hr"></div>

    <div class="grid">
      <div class="card" style="grid-column:span 12">
        <h2>Compliance</h2>
        <p class="small">Shows entries completed (0–6), last check-in date, and whether they’ve started.</p>
        <div id="compWrap" class="tableWrap"></div>
      </div>
    </div>

    <div class="hr"></div>

    <div class="small muted">
      Quick test: open this in a new tab:<br/>
      <code id="pingUrl">—</code>
    </div>
  </div>
</div>

<script>
(() => {
  /* ===========================
     CONFIG — EDIT THESE 2 LINES
     =========================== */
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_fRpdtlmqe4Em68Va2dmdJK5jL-jJAvppKxQK2ojfMugiggGd7gPfscYxy6SlhfN3/exec";
  const CLASS_CODE = "STOCK6WEEK";

  /* ===========================
     JSONP helper (no CORS needed)
     =========================== */
  function jsonp(fn, params = {}){
    return new Promise((resolve) => {
      const cbName = "cb_" + Math.random().toString(36).slice(2);
      const q = new URLSearchParams({
        fn,
        classCode: CLASS_CODE,
        callback: cbName,
        _: Date.now(),
        ...params
      });

      let script;
      window[cbName] = (data) => {
        try { resolve(data); }
        finally {
          try { delete window[cbName]; } catch(e){}
          try { script && script.remove(); } catch(e){}
        }
      };

      script = document.createElement("script");
      script.src = `${SCRIPT_URL}?${q.toString()}`;
      script.onerror = () => {
        resolve({ ok:false, error:"JSONP load error (SCRIPT_URL unreachable or blocked)" });
        try { delete window[cbName]; } catch(e){}
        try { script.remove(); } catch(e){}
      };
      document.body.appendChild(script);
    });
  }

  const $ = (id) => document.getElementById(id);
  const fmtMoney = (n) => Number(n || 0).toLocaleString(undefined, { style:"currency", currency:"USD", maximumFractionDigits:2 });
  const esc = (s) => (s ?? "").toString()
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");

  $("ccLabel").textContent = CLASS_CODE;
  const ping = `${SCRIPT_URL}?fn=ping&classCode=${encodeURIComponent(CLASS_CODE)}`;
  $("pingUrl").textContent = ping;

  function setMsg(type, text){
    const el = $("topMsg");
    el.className = `msg show ${type}`;
    el.textContent = text;
  }
  function clearMsg(){
    const el = $("topMsg");
    el.className = "msg";
    el.textContent = "";
  }

  function renderLeaderboard(list){
    const el = $("leaderWrap");
    if(!Array.isArray(list) || list.length === 0){
      el.innerHTML = `<div class="small" style="padding:12px">No leaderboard data yet.</div>`;
      return;
    }
    const rows = list.map((s,i)=>`
      <tr>
        <td><strong>#${i+1}</strong></td>
        <td><strong>${esc(s.name)}</strong></td>
        <td>${esc(s.period || "")}</td>
        <td>${String(s.entriesCount || 0)}</td>
        <td>${esc(s.lastEntryDate || "—")}</td>
        <td><strong>${(typeof s.lastValue==="number") ? fmtMoney(s.lastValue) : "—"}</strong></td>
        <td>${(typeof s.gain==="number") ? fmtMoney(s.gain) : "—"}</td>
      </tr>
    `).join("");

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Rank</th><th>Student</th><th>Period</th><th>Entries</th>
            <th>Last Date</th><th>Value</th><th>Gain/Loss</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderCompliance(list){
    const el = $("compWrap");
    if(!Array.isArray(list) || list.length === 0){
      el.innerHTML = `<div class="small" style="padding:12px">No compliance data yet.</div>`;
      return;
    }

    // Sort by period then name (nice for teachers)
    const sorted = [...list].sort((a,b)=>{
      const pa = (a.period||"").toString();
      const pb = (b.period||"").toString();
      if(pa !== pb) return pa.localeCompare(pb, undefined, {numeric:true});
      return (a.name||"").toString().localeCompare((b.name||"").toString());
    });

    const rows = sorted.map(s=>`
      <tr>
        <td><strong>${esc(s.name)}</strong></td>
        <td>${esc(s.period || "")}</td>
        <td><strong>${String(s.entriesCount || 0)}</strong></td>
        <td>${esc(s.lastEntryDate || "—")}</td>
        <td>${esc(s.startedAtLocal || "—")}</td>
      </tr>
    `).join("");

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Student</th><th>Period</th><th>Entries</th><th>Last Check-In</th><th>Started</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function refresh(){
    clearMsg();
    $("status").textContent = "Loading…";

    // 1) Ping first (best error message)
    const pingRes = await jsonp("ping");
    if(!pingRes || !pingRes.ok){
      $("status").textContent = "Error.";
      setMsg("bad",
        "Dashboard cannot reach the Apps Script web app. " +
        "Fix SCRIPT_URL or the deployment access settings (Anyone / Anyone with link). " +
        `Details: ${pingRes?.error || "no response"}`
      );
      $("leaderWrap").innerHTML = `<div class="small" style="padding:12px">—</div>`;
      $("compWrap").innerHTML = `<div class="small" style="padding:12px">—</div>`;
      return;
    }

    // 2) Load leaderboard + compliance
    const [lb, comp] = await Promise.all([
      jsonp("leaderboard"),
      jsonp("compliance")
    ]);

    if(!lb?.ok){
      setMsg("warn", `Leaderboard failed. ${lb?.error || "Unknown error"}`);
    }
    if(!comp?.ok){
      setMsg("warn", `Compliance failed. ${comp?.error || "Unknown error"}`);
    }

    renderLeaderboard(lb?.ok ? (lb.data || []) : []);
    renderCompliance(comp?.ok ? (comp.data || []) : []);

    $("status").textContent = `Updated: ${new Date().toLocaleString()}`;

    if(lb?.ok && comp?.ok){
      setMsg("good", "Connected ✅ Data loaded from teacher sheet.");
      setTimeout(clearMsg, 1600);
    }
  }

  $("refreshBtn").addEventListener("click", refresh);
  refresh();
})();
</script>
</body>
</html>
